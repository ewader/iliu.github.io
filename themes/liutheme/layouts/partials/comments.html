<div class="comments-section">
  <h3 class="comments-title">{{ i18n "comments_title" }}</h3>
  <div id="tcomment"></div>
</div>
<script>
/* Twikoo 懒加载 — 滚动到评论区时才加载 CDN 脚本 */
(function() {
  var section = document.querySelector('.comments-section');
  if (!section) return;
  var loaded = false;
  function loadTwikoo() {
    if (loaded) return;
    loaded = true;
    var s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/twikoo@1.7.11/dist/twikoo.min.js';
    s.onload = function() {
      twikoo.init({
        envId: 'https://talk.iliu.org/.netlify/functions/twikoo',
        el: '#tcomment',
        lang: 'zh-CN',
      });
    };
    document.head.appendChild(s);
  }
  if ('IntersectionObserver' in window) {
    var io = new IntersectionObserver(function(entries) {
      if (entries[0].isIntersecting) { loadTwikoo(); io.disconnect(); }
    }, { rootMargin: '200px' });
    io.observe(section);
  } else {
    loadTwikoo();
  }
})();
</script>
