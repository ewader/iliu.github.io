<!-- 微博客 -->
<div class="memos-widget">
    <h3 class="widget-title">微博客</h3>
    <div id="memos-container" class="memos-container">
        <div class="memos-loading">加载中...</div>
    </div>
</div>

<script>
(function() {
    const MEMOS_API = 'https://note.l22.org/api/v1/memos?pageSize=1&visibility=PUBLIC';
    const container = document.getElementById('memos-container');
    
    fetch(MEMOS_API)
        .then(response => response.json())
        .then(result => {
            const data = result.memos || [];
            if (!data || data.length === 0) {
                container.innerHTML = '<div class="memos-empty">暂无内容</div>';
                return;
            }
            
            let html = '';
            data.forEach(memo => {
                let content = memo.content || '';
                // 截取80个字
                if (content.length > 80) {
                    content = content.substring(0, 80) + '...';
                }
                // 转换换行符
                content = content.replace(/\n/g, '<br>');
                
                const date = new Date(memo.createTime);
                const dateStr = date.toLocaleDateString('zh-CN', {
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit'
                });
                
                html += `
                    <div class="memo-item">
                        <div class="memo-content">${content}</div>
                        <div class="memo-date">${dateStr}</div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        })
        .catch(error => {
            console.error('加载微博客失败:', error);
            container.innerHTML = '<div class="memos-error">加载失败</div>';
        });
})();
</script>
