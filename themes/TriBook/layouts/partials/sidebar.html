<aside class="sidebar">
    <!-- 热力图 -->
    {{ partial "heatmap" . }}

    <!-- 标签云 -->
    <div class="sidebar-widget">
        <h3 class="widget-title">Tags</h3>
        <ul class="tags-list">
            {{ $tags := .Site.Taxonomies.tags.ByCount }}
            {{ range first 8 $tags }}
            <li>
                <a href="{{ "/tags/" | relURL }}{{ .Name | urlize }}/" class="tag-link">
                    #{{ .Name }}
                    <span class="tag-count">{{ .Count }}</span>
                </a>
            </li>
            {{ end }}
            {{ if gt (len .Site.Taxonomies.tags) 8 }}
            <li>
                <a href="{{ "/tags/" | relURL }}" class="tag-link">
                    #More..
                    <span class="tag-count">→</span>
                </a>
            </li>
            {{ end }}
        </ul>
    </div>
</aside>
