<div id="memos-now" style="margin-top:0.5em">
  <span style="color:var(--secondary);font-size:0.85em">加载中...</span>
</div>
<script>
(function(){
  fetch('https://note.l22.org/api/v1/memos?pageSize=1&visibility=PUBLIC')
    .then(function(r){return r.json()})
    .then(function(d){
      var c = d.memos && d.memos[0];
      if(!c) return;
      var t = c.createTime.split('T')[0];
      var con = c.content.replace(/\n/g, '<br>');
      document.getElementById('memos-now').innerHTML =
        '<div style="border:1px solid #888;border-radius:8px;padding:.8em 1em;margin-top:.3em;background:var(--entry-bg)">' +
        '<p style="margin:0;font-size:.9em">'+con+'</p>' +
        '<p style="margin:0.3em 0 0;font-size:.78em;text-align:right"><a href="https://note.l22.org" target="_blank" style="color:var(--secondary)">⏰ '+t+'</a></p></div>';
    });
})();
</script>
