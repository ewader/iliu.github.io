<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主题测试</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #333333;
        }
        [data-theme='dark'] {
            --bg-color: #1a1a1a;
            --text-color: #e0e0e0;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            transition: all 0.3s ease;
        }
        .theme-info {
            margin: 20px 0;
            padding: 10px;
            border: 1px solid currentColor;
        }
    </style>
</head>
<body>
    <h1>主题切换测试</h1>
    <div class="theme-info">
        <p>当前主题：<span id="current-theme">检测中...</span></p>
        <p>存储的主题：<span id="stored-theme">无</span></p>
        <p>系统主题：<span id="system-theme">检测中...</span></p>
    </div>
    <button id="theme-toggle">切换主题</button>
    <button onclick="localStorage.clear(); location.reload();">清除存储并刷新</button>

    <script src="/js/search.js"></script>
    <script>
        // 额外的调试代码
        setInterval(function() {
            const htmlElement = document.documentElement;
            const currentTheme = htmlElement.getAttribute('data-theme');
            const storedTheme = localStorage.getItem('theme-preference');
            const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            
            document.getElementById('current-theme').textContent = currentTheme || '无（跟随系统）';
            document.getElementById('stored-theme').textContent = storedTheme || '无';
            document.getElementById('system-theme').textContent = systemTheme;
        }, 500);
    </script>
</body>
</html>
